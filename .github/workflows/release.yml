          TOML
          sed -i 's/^          //' vendor/bloom/native/tvos/Cargo.toml
          mkdir -p vendor/bloom/native/tvos/src && touch vendor/bloom/native/tvos/src/lib.rs
          cat > vendor/bloom/native/tvos/build.rs << 'BUILDRS'
          fn main() {
              let dir = std::env::var("CARGO_MANIFEST_DIR").unwrap();
              let target = std::env::var("TARGET").unwrap_or_default();
              let lib = "libbloom_tvos";
              let out = if target.is_empty() {
                  format!("{}/target/release", dir)
