          edition = "2021"
          build = "build.rs"
          [lib]
          name = "bloom_macos"
          TOML
          sed -i 's/^          //' vendor/bloom/native/macos/Cargo.toml
          mkdir -p vendor/bloom/native/macos/src && touch vendor/bloom/native/macos/src/lib.rs
          cat > vendor/bloom/native/macos/build.rs << 'BUILDRS'
          fn main() {
