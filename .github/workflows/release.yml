        run: |
          mkdir -p /tmp/perry-install
          gh release download --repo PerryTS/perry --pattern 'perry-linux-x86_64.tar.gz' --dir /tmp/perry-install
          tar xzf /tmp/perry-install/perry-linux-x86_64.tar.gz -C /tmp/perry-install
