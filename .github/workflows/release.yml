          PERRY_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PERRY_APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          PERRY_APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}

  # ─────────────────────────────────────────────
  # macOS → App Store
  # ─────────────────────────────────────────────
  build-macos:
    name: macOS (App Store)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bloom engine SDK
        run: |
          git clone --depth 1 https://github.com/Bloom-Engine/engine.git vendor/bloom
          rm -rf vendor/bloom/.git vendor/bloom/.gitignore
          sed -i 's|"bloom": "file:../engine/"|"bloom": "file:./vendor/bloom/"|' package.json
