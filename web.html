<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bloom Jump</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100vw; height: 100vh; overflow: hidden; background: #000; }
    canvas { display: block; width: 100%; height: 100%; }
    #loading {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: #fff; font-family: monospace; font-size: 18px; text-align: center;
    }
    #perry-root { display: none; }
  </style>
</head>
<body>
  <canvas id="bloom-canvas"></canvas>
  <div id="perry-root"></div>
  <div id="loading">Loading Bloom Engine...</div>

  <!-- Phase 1: Load Bloom WASM engine and build FFI bridge -->
  <script type="module">
    import init, * as bloom from './pkg/bloom_web.js';
    await init();

    // NaN-boxing conversion: Perry WASM ↔ Bloom WASM
    const _buf = new ArrayBuffer(8);
    const _f64v = new Float64Array(_buf);
    const _u64v = new BigUint64Array(_buf);
    function i64ToF64(bigint) { _u64v[0] = BigInt.asUintN(64, bigint); return _f64v[0]; }
    function f64ToI64(f) { _f64v[0] = f; return _u64v[0]; }

    function perryVal(i64) {
      const f = i64ToF64(i64);
      return globalThis.__perryToJsValue ? globalThis.__perryToJsValue(f) : f;
    }

    // Default: wrap all bloom_* exports with i64↔f64 conversion
    const ffiImports = {};
    for (const [name, fn] of Object.entries(bloom)) {
      if (typeof fn === 'function' && name.startsWith('bloom_')) {
        ffiImports[name] = (...args) => {
          const converted = args.map(a => typeof a === 'bigint' ? i64ToF64(a) : a);
          const result = fn(...converted);
          return typeof result === 'number' ? f64ToI64(result) : undefined;
        };
      }
    }

    // --- String-parameter overrides (use _str variants) ---
    ffiImports['bloom_draw_text'] = (text, x, y, size, r, g, b, a) => {
      bloom.bloom_draw_text_str(String(perryVal(text)),
        i64ToF64(x), i64ToF64(y), i64ToF64(size),
        i64ToF64(r), i64ToF64(g), i64ToF64(b), i64ToF64(a));
    };
    ffiImports['bloom_measure_text'] = (text, size) => {
      return f64ToI64(bloom.bloom_measure_text_str(String(perryVal(text)), i64ToF64(size)));
    };
    ffiImports['bloom_draw_text_ex'] = (font, text, x, y, size, spacing, r, g, b, a) => {
      bloom.bloom_draw_text_ex_str(i64ToF64(font), String(perryVal(text)),
        i64ToF64(x), i64ToF64(y), i64ToF64(size), i64ToF64(spacing),
        i64ToF64(r), i64ToF64(g), i64ToF64(b), i64ToF64(a));
    };
    ffiImports['bloom_measure_text_ex'] = (font, text, size, spacing) => {
      return f64ToI64(bloom.bloom_measure_text_ex_str(
        i64ToF64(font), String(perryVal(text)), i64ToF64(size), i64ToF64(spacing)));
    };

    // --- Asset loading: sync fetch → _bytes variant ---
    function syncFetchBytes(url) {
      try {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', url, false);
        xhr.responseType = 'arraybuffer';
        xhr.send();
        if (xhr.status === 200 || xhr.status === 0) return new Uint8Array(xhr.response);
      } catch (e) { console.warn('syncFetchBytes failed for', url, e); }
      return null;
    }

    ffiImports['bloom_load_texture'] = (path) => {
      const data = syncFetchBytes(String(perryVal(path)));
      if (data) return f64ToI64(bloom.bloom_load_texture_bytes(data));
      return f64ToI64(0.0);
    };
    ffiImports['bloom_load_sound'] = (path) => {
      const data = syncFetchBytes(String(perryVal(path)));
      if (data) return f64ToI64(bloom.bloom_load_sound_bytes(data));
      return f64ToI64(0.0);
    };
    ffiImports['bloom_load_music'] = (path) => {
      const data = syncFetchBytes(String(perryVal(path)));
      if (data) return f64ToI64(bloom.bloom_load_music_bytes(data));
      return f64ToI64(0.0);
    };
    ffiImports['bloom_load_image'] = (path) => {
      const data = syncFetchBytes(String(perryVal(path)));
      if (data) return f64ToI64(bloom.bloom_load_image_bytes(data));
      return f64ToI64(0.0);
    };
    ffiImports['bloom_load_font'] = (path) => {
      const data = syncFetchBytes(String(perryVal(path)));
      if (data) return f64ToI64(bloom.bloom_load_font_bytes(data));
      return f64ToI64(0.0);
    };

    // --- Web Audio: Bloom's AudioMixer → Web Audio API ---
    let audioCtx = null, audioProc = null;
    ffiImports['bloom_init_audio'] = () => {
      try {
        audioCtx = new AudioContext({ sampleRate: 44100 });
        const bufSize = 4096;
        audioProc = audioCtx.createScriptProcessor(bufSize, 0, 2);
        audioProc.onaudioprocess = (e) => {
          const left = e.outputBuffer.getChannelData(0);
          const right = e.outputBuffer.getChannelData(1);
          const interleaved = new Float32Array(left.length * 2);
          bloom.bloom_audio_mix(interleaved);
          for (let i = 0; i < left.length; i++) {
            left[i] = interleaved[i * 2];
            right[i] = interleaved[i * 2 + 1];
          }
        };
        audioProc.connect(audioCtx.destination);
      } catch (e) { console.warn('Web Audio init failed:', e); }
    };
    ffiImports['bloom_close_audio'] = () => {
      if (audioProc) { audioProc.disconnect(); audioProc = null; }
      if (audioCtx) { audioCtx.close(); audioCtx = null; }
    };
    // Resume on first interaction (browser autoplay policy)
    const resumeAudio = () => { if (audioCtx?.state === 'suspended') audioCtx.resume(); };
    document.addEventListener('click', resumeAudio, { once: true });
    document.addEventListener('keydown', resumeAudio, { once: true });
    document.addEventListener('touchstart', resumeAudio, { once: true });

    // --- Window: string title handling ---
    ffiImports['bloom_init_window'] = (w, h, title, fs) => {
      document.title = String(perryVal(title)) || 'Bloom Jump';
      bloom.bloom_init_window(i64ToF64(w), i64ToF64(h), 0, i64ToF64(fs));
    };
    ffiImports['bloom_set_window_title'] = (title) => {
      document.title = String(perryVal(title));
    };
    ffiImports['bloom_set_window_icon'] = () => {}; // no-op on web

    // --- Platform: return 7 for web ---
    ffiImports['bloom_get_platform'] = () => f64ToI64(7.0);

    // --- File I/O: localStorage + server fetch ---
    const LS_PREFIX = 'bloom_fs:';
    ffiImports['bloom_write_file'] = (path, data) => {
      try {
        localStorage.setItem(LS_PREFIX + String(perryVal(path)), String(perryVal(data)));
        return f64ToI64(1.0);
      } catch (e) { return f64ToI64(0.0); }
    };
    ffiImports['bloom_read_file'] = (path) => {
      const url = String(perryVal(path));
      const stored = localStorage.getItem(LS_PREFIX + url);
      if (stored !== null) {
        if (globalThis.__perryFromJsValue) return f64ToI64(globalThis.__perryFromJsValue(stored));
        return f64ToI64(0.0);
      }
      // Fetch from server for bundled files (levels etc.)
      try {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', url, false);
        xhr.send();
        if (xhr.status === 200) {
          if (globalThis.__perryFromJsValue) return f64ToI64(globalThis.__perryFromJsValue(xhr.responseText));
        }
      } catch (e) {}
      return f64ToI64(0.0);
    };
    ffiImports['bloom_file_exists'] = (path) => {
      const url = String(perryVal(path));
      if (localStorage.getItem(LS_PREFIX + url) !== null) return f64ToI64(1.0);
      try {
        const xhr = new XMLHttpRequest();
        xhr.open('HEAD', url, false);
        xhr.send();
        return f64ToI64(xhr.status === 200 ? 1.0 : 0.0);
      } catch (e) { return f64ToI64(0.0); }
    };

    // --- Fullscreen ---
    ffiImports['bloom_toggle_fullscreen'] = () => {
      const c = document.getElementById('bloom-canvas');
      if (!document.fullscreenElement) c.requestFullscreen().catch(() => {});
      else document.exitFullscreen().catch(() => {});
    };

    // --- Input: inject keyboard events into Bloom engine ---
    const keyMap = {
      'KeyA': 65, 'KeyB': 66, 'KeyC': 67, 'KeyD': 68, 'KeyE': 69, 'KeyF': 70,
      'KeyG': 71, 'KeyH': 72, 'KeyI': 73, 'KeyJ': 74, 'KeyK': 75, 'KeyL': 76,
      'KeyM': 77, 'KeyN': 78, 'KeyO': 79, 'KeyP': 80, 'KeyQ': 81, 'KeyR': 82,
      'KeyS': 83, 'KeyT': 84, 'KeyU': 85, 'KeyV': 86, 'KeyW': 87, 'KeyX': 88,
      'KeyY': 89, 'KeyZ': 90,
      'Digit0': 48, 'Digit1': 49, 'Digit2': 50, 'Digit3': 51, 'Digit4': 52,
      'Digit5': 53, 'Digit6': 54, 'Digit7': 55, 'Digit8': 56, 'Digit9': 57,
      'Space': 32, 'Enter': 257, 'Escape': 256, 'Backspace': 259, 'Tab': 258,
      'ArrowUp': 265, 'ArrowDown': 264, 'ArrowLeft': 263, 'ArrowRight': 262,
      'ShiftLeft': 340, 'ShiftRight': 344, 'ControlLeft': 341, 'ControlRight': 345,
      'AltLeft': 342, 'AltRight': 346,
      'F1': 290, 'F2': 291, 'F3': 292, 'F4': 293, 'F5': 294, 'F6': 295,
      'F7': 296, 'F8': 297, 'F9': 298, 'F10': 299, 'F11': 300, 'F12': 301,
    };
    document.addEventListener('keydown', (e) => {
      const code = keyMap[e.code];
      if (code !== undefined) { bloom.bloom_inject_key_down(code); e.preventDefault(); }
    });
    document.addEventListener('keyup', (e) => {
      const code = keyMap[e.code];
      if (code !== undefined) { bloom.bloom_inject_key_up(code); e.preventDefault(); }
    });

    // --- bloom_run_game: rAF loop ---
    ffiImports['bloom_run_game'] = (callbackHandle) => {
      // Store for Phase 2 — Perry runtime provides closure_call_1
      globalThis.__bloomGameCallback = callbackHandle;
      globalThis.__bloomGameRunning = true;
    };
    // window_should_close returns 1 once run_game takes over
    const origShouldClose = ffiImports['bloom_window_should_close'];
    ffiImports['bloom_window_should_close'] = () => {
      if (globalThis.__bloomGameRunning) return f64ToI64(1.0);
      return origShouldClose ? origShouldClose() : f64ToI64(0.0);
    };

    // Expose for Perry WASM
    globalThis.__ffiImports = ffiImports;
    globalThis.__bloomModule = bloom;

    document.getElementById('loading').textContent = 'Loading game...';
    console.log('Bloom Engine ready. Loading Perry WASM...');

    // Phase 2: Load Perry runtime + game WASM dynamically
    // (must happen after __ffiImports is set)
    async function loadScript(url) {
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = url;
        s.onload = resolve;
        s.onerror = reject;
        document.body.appendChild(s);
      });
    }

    await loadScript('./perry_runtime.js');
    await loadScript('./perry_boot.js');

    // Phase 3: Start rAF loop now that Perry's main() has run
    document.getElementById('loading').style.display = 'none';

    if (globalThis.__bloomGameRunning && globalThis.__bloomGameCallback !== undefined) {
      const cb = globalThis.__bloomGameCallback;
      // Perry exposes closure_call_1 after boot
      function frame() {
        if (!globalThis.__bloomGameRunning) return;
        bloom.bloom_begin_drawing();
        const dt = bloom.bloom_get_delta_time();
        // Call Perry closure via the runtime's exposed caller
        if (globalThis.__perryClosureCall1) {
          globalThis.__perryClosureCall1(cb, dt);
        }
        bloom.bloom_end_drawing();
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }
  </script>
</body>
</html>
